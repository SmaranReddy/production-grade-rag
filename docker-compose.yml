version: "3.9"

services:
  # ─────────────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────────────
  api:
    build: .
    container_name: ek_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./enterprise_kb.db
    volumes:
      - ./backend/data:/app/backend/data    # indexes, uploads, DB file
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Prometheus — scrapes /metrics from API
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: ek_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Grafana — dashboards on top of Prometheus
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: ek_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
